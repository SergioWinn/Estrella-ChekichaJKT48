<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="512" height="512">
  <!-- Transparent background — no rect fill -->

  <g transform="translate(32,32)">

    <!-- Camera body -->
    <rect x="-26" y="-20" width="52" height="40" rx="7" ry="7"
          fill="#1c2128" stroke="#4b5563" stroke-width="2.2"/>

    <!-- Viewfinder bump -->
    <rect x="-7" y="-27" width="14" height="10" rx="3" ry="3"
          fill="#1c2128" stroke="#4b5563" stroke-width="2.2"/>

    <!-- Outer lens ring -->
    <circle cx="0" cy="1" r="16"
            fill="#1c2128" stroke="#f3efe6" stroke-width="2.6"/>

    <!-- Mid lens ring -->
    <circle cx="0" cy="1" r="12"
            fill="#1c2128" stroke="#4b5563" stroke-width="1.4"/>

    <!-- Lens center -->
    <circle cx="0" cy="1" r="8.5"
            fill="#0d1014"/>

    <!-- Subtle inner lens highlight -->
    <circle cx="-2.5" cy="-1.5" r="2"
            fill="#f3efe6" opacity="0.13"/>

    <!-- Gold sparkle — upper right, 4-point star -->
    <g transform="translate(19.5, -15.5)">
      <line x1="0" y1="-3.2" x2="0" y2="3.2"
            stroke="#d6a24a" stroke-width="1.1" stroke-linecap="round"/>
      <line x1="-3.2" y1="0" x2="3.2" y2="0"
            stroke="#d6a24a" stroke-width="1.1" stroke-linecap="round"/>
      <line x1="-1.8" y1="-1.8" x2="1.8" y2="1.8"
            stroke="#d6a24a" stroke-width="0.6" stroke-linecap="round" opacity="0.75"/>
      <line x1="1.8" y1="-1.8" x2="-1.8" y2="1.8"
            stroke="#d6a24a" stroke-width="0.6" stroke-linecap="round" opacity="0.75"/>
      <circle cx="0" cy="0" r="0.7" fill="#d6a24a"/>
    </g>

  </g>
</svg>
